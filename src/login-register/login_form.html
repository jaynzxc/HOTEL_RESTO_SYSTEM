<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · Customer Portal</title>
  <!-- Tailwind CSS -->
  <link href="/src/output.css" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-slate-100 font-sans antialiased flex items-center justify-center min-h-screen p-4">

  <!-- main card: clean, centered, no side panel -->
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">

    <!-- brand (simplified) -->
    <div class="flex justify-center items-center gap-2 text-amber-700 mb-3">
      <i class="fa-solid fa-utensils text-xl"></i>
      <i class="fa-solid fa-bed text-xl"></i>
      <span class="font-semibold text-xl tracking-tight text-slate-800">Hotel and<span class="text-amber-600"> Restaurant</span></span>
    </div>

    <!-- title -->
    <div class="flex mb-2">
      <h1 class="flex-1 pb-3 text-center text-3xl font-bold text-amber-600 transition">Log In</h1>
    </div>

    <!-- LOGIN FORM -->
    <div id="loginForm" class="transition-opacity">
      <form id="loginFormElement">
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
            <div class="relative">
              <i class="fa-regular fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
              <input type="email" id="loginEmail" placeholder="you@example.com" class="w-full border border-slate-200 rounded-xl pl-9 pr-4 py-2.5 text-sm focus:ring-1 focus:ring-amber-500 outline-none" required>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
            <div class="relative">
              <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
              <input type="password" id="loginPassword" placeholder="••••••••" class="w-full border border-slate-200 rounded-xl pl-9 pr-10 py-2.5 text-sm focus:ring-1 focus:ring-amber-500 outline-none" required>
              <button type="button" class="toggle-password absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                <i class="fa-regular fa-eye-slash text-sm"></i>
              </button>
            </div>
          </div>
          <div class="flex items-center justify-between text-sm">
            <label class="flex items-center gap-2">
              <input type="checkbox" id="rememberMe" class="rounded text-amber-600 focus:ring-amber-500"> 
              <span class="text-slate-600">Remember me</span>
            </label>
            <a href="#" id="forgotPassword" class="text-amber-600 hover:underline">Forgot password?</a>
          </div>
          <button type="submit" id="loginBtn" class="w-full bg-amber-600 hover:bg-amber-700 text-white py-2.5 rounded-xl font-medium transition shadow-sm">Sign in</button>
        </div>
      </form>
      
      <!-- Error message container -->
      <div id="loginError" class="mt-3 text-sm text-red-600 text-center hidden"></div>
      
      <!-- Success message container -->
      <div id="loginSuccess" class="mt-3 text-sm text-green-600 text-center hidden"></div>
      
      <p class="text-center text-sm text-slate-500 mt-5">
        Don't have an account? <a href="./register_form.html" class="text-amber-600 font-medium hover:underline">Register</a>
      </p>
    </div>
  </div>

  <script>
    // Wait for DOM to load
    document.addEventListener('DOMContentLoaded', function() {
      
      // ===== PASSWORD VISIBILITY TOGGLE =====
      const toggleButtons = document.querySelectorAll('.toggle-password');
      
      toggleButtons.forEach(button => {
        button.addEventListener('click', function() {
          const input = this.previousElementSibling;
          const icon = this.querySelector('i');
          
          if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
          } else {
            input.type = 'password';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
          }
        });
      });

      // ===== LOGIN FORM VALIDATION =====
      const loginForm = document.getElementById('loginFormElement');
      const loginEmail = document.getElementById('loginEmail');
      const loginPassword = document.getElementById('loginPassword');
      const rememberMe = document.getElementById('rememberMe');
      const loginError = document.getElementById('loginError');
      const loginSuccess = document.getElementById('loginSuccess');
      
      // Hide messages when user starts typing
      loginEmail.addEventListener('input', function() {
        loginError.classList.add('hidden');
        loginSuccess.classList.add('hidden');
      });
      
      loginPassword.addEventListener('input', function() {
        loginError.classList.add('hidden');
        loginSuccess.classList.add('hidden');
      });

      // Form submission
      loginForm.addEventListener('submit', function(e) {
        e.preventDefault(); // Prevent actual form submission
        
        // Get values
        const email = loginEmail.value.trim();
        const password = loginPassword.value;
        
        // Simple validation
        if (!email || !password) {
          showError('Please fill in all fields');
          return;
        }
        
        if (!isValidEmail(email)) {
          showError('Please enter a valid email address');
          return;
        }
        
        if (password.length < 6) {
          showError('Password must be at least 6 characters');
          return;
        }
        
        // Simulate successful login
        showSuccess('Login successful! Redirecting...');
        
        // Save to localStorage if "Remember me" is checked
        if (rememberMe.checked) {
          localStorage.setItem('rememberedEmail', email);
          console.log('Email saved to localStorage');
        } else {
          localStorage.removeItem('rememberedEmail');
        }
        
        // Simulate redirect after 2 seconds
        setTimeout(function() {
          alert('Welcome back, ' + email + '!');
          // Uncomment to actually redirect:
          // window.location.href = './dashboard.html';
        }, 2000);
      });

      // ===== FORGOT PASSWORD =====
      const forgotPassword = document.getElementById('forgotPassword');
      
      forgotPassword.addEventListener('click', function(e) {
        e.preventDefault();
        
        const email = loginEmail.value.trim();
        
        if (email && isValidEmail(email)) {
          alert('Password reset link sent to ' + email);
        } else {
          alert('Please enter your email address first');
          loginEmail.focus();
        }
      });

      // ===== CHECK FOR REMEMBERED EMAIL =====
      const rememberedEmail = localStorage.getItem('rememberedEmail');
      if (rememberedEmail) {
        loginEmail.value = rememberedEmail;
        rememberMe.checked = true;
      }

      // ===== HELPER FUNCTIONS =====
      function isValidEmail(email) {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return emailRegex.test(email);
      }
      
      function showError(message) {
        loginError.textContent = message;
        loginError.classList.remove('hidden');
        loginSuccess.classList.add('hidden');
      }
      
      function showSuccess(message) {
        loginSuccess.textContent = message;
        loginSuccess.classList.remove('hidden');
        loginError.classList.add('hidden');
      }

      // ===== ADD LOADING STATE TO BUTTON =====
      const loginBtn = document.getElementById('loginBtn');
      
      // Optional: Add loading state on submit
      loginForm.addEventListener('submit', function() {
        loginBtn.disabled = true;
        loginBtn.classList.add('opacity-50', 'cursor-not-allowed');
        loginBtn.textContent = 'Signing in...';
        
        // Re-enable after 2 seconds (for simulation)
        setTimeout(function() {
          loginBtn.disabled = false;
          loginBtn.classList.remove('opacity-50', 'cursor-not-allowed');
          loginBtn.textContent = 'Sign in';
        }, 2000);
      });

    }); // End DOMContentLoaded
  </script>
</body>
</html>
